architectures:
  - name: "vgg16"
    pretrained: true
    num_classes: 10
  - name: "resnet18"
    pretrained: true
    num_classes: 10
  - name: "resnet50"
    pretrained: true
    num_classes: 10
  - name: "densenet121"
    pretrained: true
    num_classes: 10
dataset:
  name: "CIFAR-10"
  batch_size: 32
  num_workers: 4
training:
  epochs: 15
  learning_rate: 0.001
  fine_tune_layers: "last_block"
comparison:
  metrics: ["accuracy", "params", "flops", "inference_time"]
  output_dir: "output/"
